name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  MEMCACHED_VERSION: '1.6.44'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up JDK 8
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          java-version: '8'
          distribution: 'corretto'

      - name: Install Ant
        run: sudo apt-get update && sudo apt-get install -y ant libevent-dev

      - name: Cache Ivy dependencies
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.ivy2/cache
          key: ${{ runner.os }}-ivy-${{ hashFiles('**/ivy.xml') }}
          restore-keys: |
            ${{ runner.os }}-ivy-

      - name: Build memcached from source
        run: |
          git clone --branch ${{ env.MEMCACHED_VERSION }} --depth 1 https://github.com/memcached/memcached.git /tmp/memcached-build
          cd /tmp/memcached-build
          ./autogen.sh
          ./configure
          make -j$(nproc)
          sudo make install

      - name: Build
        run: ant compile

      - name: Run unit tests
        run: ant test

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: unit-test-reports
          path: build/junit/

      - name: Run Static integration tests
        run: ant it -Dclient.mode=Static -Dserver.bin=/usr/local/bin/memcached

      # TODO: Add dynamic integration tests

      - name: Upload integration test reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: integration-test-reports
          path: build/junit/
